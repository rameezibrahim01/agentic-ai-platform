# Client-site / pilot profile (build-plan Phase 1, exit drill 7: the artifact test).
# Infrastructure services are real today; app services are enabled by tickets 003+.
# Rule (CLAUDE.md #8): everything here must run inside the client's network.
name: agentic-platform
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: platform
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: platform
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_SEEDS: postgres
    ports: [ "7233:7233" ]

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on: [ temporal ]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: [ "8080:8080" ]

  # --- app services (enabled by ticket 011: the artifact test) ---
  worker:
    build: { context: .., dockerfile: apps/worker/Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
      temporal: { condition: service_started }
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      DATABASE_URL: postgres://platform:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/platform
      # prod by default: governed writes pause for approval (override for the
      # environment-split half of drill p2-1)
      PLATFORM_ENV: ${PLATFORM_ENV:-prod}
      # per-tenant overrides (ticket 041): tools.<id>.config.json /
      # models.<id>.config.json mounted BESIDE these shared files govern
      # that tenant's lane; absent = shared, invalid = boot failure
      TOOLS_CONFIG: /etc/platform/tools.config.json
      NOTES_FILE: /data/notes/notes.log
      STUB_SCRIPT: demo-write
      # real model provider (ticket 026): both optional; empty = hermetic stub.
      # MODELS_CONFIG is a path inside the container — mount your own file
      # (see models.config.example.json) and set it in .env.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MODELS_CONFIG: ${MODELS_CONFIG:-}
      # agent registry + environment pointers (ticket 028)
      AGENTS_CONFIG: /etc/platform/agents.config.json
      # operator limits (ticket 033): edit the mounted file to flip switches
      LIMITS_CONFIG: /etc/platform/limits.config.json
      # client-provided data key (ticket 035): empty = plaintext logs
      PLATFORM_DATA_KEY: ${PLATFORM_DATA_KEY:-}
      # tenanted mode (tickets 036/037): point at the mounted tenants file to
      # run one isolated lane per tenant; empty = today's single-tenant boot.
      # Onboarding a tenant = editing tenants.config.json + restart (drill p4-3).
      TENANTS_CONFIG: ${TENANTS_CONFIG:-}
      # per-tenant data keys (036): names must match dataKeyEnv in the tenants file
      ACME_DATA_KEY: ${ACME_DATA_KEY:-}
      GLOBEX_DATA_KEY: ${GLOBEX_DATA_KEY:-}
      # approval notifications (ticket 051): empty = off
      NOTIFICATIONS_CONFIG: ${NOTIFICATIONS_CONFIG:-}
      APPROVALS_WEBHOOK_URL: ${APPROVALS_WEBHOOK_URL:-}
    volumes:
      - "./tools.config.json:/etc/platform/tools.config.json:ro"
      - "./agents.config.json:/etc/platform/agents.config.json:ro"
      - "./limits.config.json:/etc/platform/limits.config.json:ro"
      - "./tenants.config.json:/etc/platform/tenants.config.json:ro"
      - "notes:/data/notes"
    restart: on-failure # temporal namespace setup can lag the port

  console:
    build: { context: .., dockerfile: apps/console/Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://platform:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/platform
      # inbox decisions reach the engine (ticket 021)
      TEMPORAL_ADDRESS: temporal:7233
      # run launcher (ticket 054): alias resolution must match the engine's
      # policy environment — same default as the worker above
      PLATFORM_ENV: ${PLATFORM_ENV:-prod}
      # read-only limits surface (ticket 033)
      LIMITS_CONFIG: /etc/platform/limits.config.json
      # agent registry pages (ticket 052): the console reads the same file
      # the run starters resolve aliases from, fresh per request
      AGENTS_CONFIG: /etc/platform/agents.config.json
      # builder pickers (ticket 053): tool/model options for the form —
      # read-only convenience; grants and allowlists stay worker-enforced
      TOOLS_CONFIG: /etc/platform/tools.config.json
      MODELS_CONFIG: ${MODELS_CONFIG:-}
      # same data key as the worker (ticket 035): empty = plaintext logs
      PLATFORM_DATA_KEY: ${PLATFORM_DATA_KEY:-}
      # tenanted mode (ticket 038): sessions bind to a tenant; views never cross
      TENANTS_CONFIG: ${TENANTS_CONFIG:-}
      ACME_DATA_KEY: ${ACME_DATA_KEY:-}
      GLOBEX_DATA_KEY: ${GLOBEX_DATA_KEY:-}
      # dev fallback account's tenant binding (drill p4-3; real deployments
      # use AUTH_ACCOUNTS_FILE or OIDC tenant mapping instead)
      AUTH_DEV_TENANT: ${AUTH_DEV_TENANT:-}
    volumes:
      # rw (ticket 047): the console's ONE write action — audited switch
      # flips — edits this file; the worker keeps its read-only mount
      # rw (ticket 053): the builder's one write — append an immutable
      # version; the worker's run starters only ever read this file
      - "./limits.config.json:/etc/platform/limits.config.json:rw"
      - "./agents.config.json:/etc/platform/agents.config.json:rw"
      - "./tools.config.json:/etc/platform/tools.config.json:ro"
      - "./tenants.config.json:/etc/platform/tenants.config.json:ro"
    ports: [ "3000:3000" ]

volumes:
  pgdata:
  notes:
