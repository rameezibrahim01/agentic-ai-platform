# Client-site / pilot profile (build-plan Phase 1, exit drill 7: the artifact test).
# Infrastructure services are real today; app services are enabled by tickets 003+.
# Rule (CLAUDE.md #8): everything here must run inside the client's network.
name: agentic-platform
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: platform
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: platform
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_SEEDS: postgres
    ports: [ "7233:7233" ]

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on: [ temporal ]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: [ "8080:8080" ]

  # --- app services (enabled by ticket 011: the artifact test) ---
  worker:
    build: { context: .., dockerfile: apps/worker/Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
      temporal: { condition: service_started }
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      DATABASE_URL: postgres://platform:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/platform
      # prod by default: governed writes pause for approval (override for the
      # environment-split half of drill p2-1)
      PLATFORM_ENV: ${PLATFORM_ENV:-prod}
      TOOLS_CONFIG: /etc/platform/tools.config.json
      NOTES_FILE: /data/notes/notes.log
      STUB_SCRIPT: demo-write
      # real model provider (ticket 026): both optional; empty = hermetic stub.
      # MODELS_CONFIG is a path inside the container — mount your own file
      # (see models.config.example.json) and set it in .env.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MODELS_CONFIG: ${MODELS_CONFIG:-}
    volumes:
      - "./tools.config.json:/etc/platform/tools.config.json:ro"
      - "notes:/data/notes"
    restart: on-failure # temporal namespace setup can lag the port

  console:
    build: { context: .., dockerfile: apps/console/Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://platform:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/platform
      # inbox decisions reach the engine (ticket 021)
      TEMPORAL_ADDRESS: temporal:7233
    ports: [ "3000:3000" ]

volumes:
  pgdata:
  notes:
